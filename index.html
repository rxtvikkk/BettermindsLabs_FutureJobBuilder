<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Job Builder</title>
    
    <style>
        /* All CSS is included internally here to avoid creating external files */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: #f8fafc;
            text-align: center;
        }
        .header-container {
            margin-bottom: 2rem;
        }
        .header-container h1 {
            color: #0f172a;
            font-size: 1.5rem;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .hero-text {
            font-size: 2.5rem;
            color: #1e293b;
            max-width: 800px;
            margin: 0 auto 1rem auto;
            line-height: 1.2;
        }
        .explanation {
            font-size: 1.125rem;
            color: #475569;
            max-width: 600px;
            margin: 0 auto 2rem auto;
            line-height: 1.5;
        }
        .duration-badge {
            display: inline-block;
            background-color: #e0e7ff;
            color: #3730a3;
            padding: 0.5rem 1rem;
            border-radius: 9999px;
            font-weight: 600;
            margin-bottom: 2rem;
            font-size: 0.875rem;
        }
        .cta-button {
            display: inline-block;
            background-color: #2563eb;
            color: #ffffff;
            padding: 1rem 2.5rem;
            font-size: 1.25rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 0.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: background-color 0.2s ease-in-out;
        }
        .cta-button:hover {
            background-color: #1d4ed8;
        }
    </style>
</head>
<body>
    <header class="header-container">
        <!-- Minimalistic viewport header -->
        <h1>Future Job Builder</h1>
    </header>
    
    <main>
        <!-- Prominent hero text block -->
        <h2 class="hero-text">Discover careers that match your interests&mdash;and the future of work.</h2>
        
        <!-- Brief explanation of the platform -->
        <p class="explanation">
            Get personalized career recommendations tailored to your unique interests, strengths, and work style, while exploring how AI is shaping the future of industries.
        </p>
        
        <!-- Inline clear visual badge for metadata metrics -->
        <div class="duration-badge">
            Estimated Duration: 3-5 Mins
        </div>
        
        <br>
        
        <!-- Distinct, high-contrast Call-to-Action button mapping natively to /assessment -->
        <a href="/assessment" class="cta-button">Start Assessment</a>
    </main>
</body>
</html>
